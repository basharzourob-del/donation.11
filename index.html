<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="صفحة تبرع آمنة عبر Revolut">
    <title>تبرع الآن | منصة التبرعات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- شريط التحميل -->
    <div class="loader-wrapper" id="loader">
        <div class="loader"></div>
        <p>جاري التحميل...</p>
    </div>

    <!-- الصفحة الرئيسية -->
    <div class="container" id="mainContent" style="display: none;">
        <div class="donation-card">
            <div class="card-header">
                <div class="icon-heart">❤️</div>
                <h1>تبرع الآن</h1>
                <p class="subtitle">ساهم في دعم مشروعنا وكن جزءاً من التغيير</p>
            </div>

            <div class="form-section">
                <div class="input-group">
                    <label for="donorName">👤 الاسم الكامل</label>
                    <input type="text" id="donorName" placeholder="أدخل اسمك (اختياري)">
                </div>

                <div class="input-group">
                    <label for="donorEmail">📧 البريد الإلكتروني</label>
                    <input type="email" id="donorEmail" placeholder="example@email.com (اختياري)">
                </div>

                <div class="input-group">
                    <label for="donorPhone">📱 رقم الجوال</label>
                    <input type="tel" id="donorPhone" placeholder="05xxxxxxxx (اختياري)">
                </div>
            </div>

            <div class="amount-section">
                <label class="section-label">💰 اختر المبلغ</label>
                <div class="amount-buttons" id="amountButtons">
                    <button class="amount-btn" data-amount="10">10 ₪</button>
                    <button class="amount-btn" data-amount="25">25 ₪</button>
                    <button class="amount-btn" data-amount="50">50 ₪</button>
                    <button class="amount-btn" data-amount="100">100 ₪</button>
                    <button class="amount-btn" data-amount="250">250 ₪</button>
                    <button class="amount-btn" data-amount="500">500 ₪</button>
                </div>
                <div class="custom-amount">
                    <input type="number" id="customAmount" placeholder="أو أدخل مبلغاً مخصصاً" min="1" step="1">
                </div>
            </div>

            <div class="message-section">
                <label for="donorMessage">💬 رسالة دعم (اختياري)</label>
                <textarea id="donorMessage" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <div class="options-section">
                <label class="checkbox-label">
                    <input type="checkbox" id="anonymousCheckbox">
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-text">تبرع بشكل مجهول (لن يظهر اسمي)</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="shareLocationCheckbox">
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-text">مشاركة الموقع لدعم الإحصائيات (اختياري)</span>
                </label>
            </div>

            <button class="donate-btn" id="donateBtn">
                <span class="btn-text">تبرع عبر Revolut</span>
                <span class="btn-icon">💳</span>
            </button>

            <div class="status-message" id="statusMessage"></div>

            <div class="info-footer">
                <div class="security-badges">
                    <span class="badge">🔒 دفع آمن</span>
                    <span class="badge">⚡ فوري</span>
                    <span class="badge">🌍 دولي</span>
                </div>
                <p class="footer-text">سيتم توجيهك إلى بوابة الدفع الآمنة Revolut</p>
            </div>
        </div>

        <div class="modal" id="confirmModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>تأكيد التبرع</h3>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <p>أنت على وشك التبرع بمبلغ:</p>
                    <div class="confirm-amount" id="confirmAmount">0 ₪</div>
                    <div class="confirm-details" id="confirmDetails"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-cancel" id="cancelBtn">إلغاء</button>
                    <button class="btn-confirm" id="confirmBtn">تأكيد التبرع</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
